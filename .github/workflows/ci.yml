name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add x86 MSVC target
        run: rustup target add i686-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (workspace)
        run: cargo clippy --workspace --target i686-pc-windows-msvc -- -D warnings
      - name: Build (workspace, x86 release)
        run: cargo build --release --workspace --target i686-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: foundry32-x86
          path: target/i686-pc-windows-msvc/release/foundry32.exe
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-console-x86
          path: target/i686-pc-windows-msvc/release/mcp-console.exe
      - uses: actions/upload-artifact@v4
        with:
          name: witn-x86
          path: |
            target/i686-pc-windows-msvc/release/witn.exe
            target/i686-pc-windows-msvc/release/witn-gui.exe
