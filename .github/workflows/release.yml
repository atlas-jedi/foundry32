name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME.TrimStart('v')
          $cargoVer = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          if ($tag -ne $cargoVer) { throw "tag $tag != Cargo.toml version $cargoVer" }

      - name: Add x86 MSVC target
        run: rustup target add i686-pc-windows-msvc

      - name: Build (x86 release)
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          & $iscc /DMyAppVersion=$ver installer\setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Package portable zip
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          Compress-Archive -Path target\i686-pc-windows-msvc\release\mcp-hangar.exe `
            -DestinationPath "dist\mcp-hangar-$ver-x86-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MCP-Hangar-Setup-*-x86.exe
            dist/mcp-hangar-*-x86-portable.zip
          generate_release_notes: true
