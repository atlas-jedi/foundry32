name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      # Code signing is optional: the signing steps are skipped until the
      # SignPath Foundation secret/vars exist (see docs/code-signing.md).
      SIGNING_ENABLED: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME.TrimStart('v')
          $cargoVer = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          if ($tag -ne $cargoVer) { throw "tag $tag != Cargo.toml version $cargoVer" }

      - name: Add x86 MSVC target
        run: rustup target add i686-pc-windows-msvc

      - name: Build (x86 release)
        run: cargo build --release --target i686-pc-windows-msvc

      - name: Upload unsigned exe (for signing)
        id: unsigned-exe
        if: env.SIGNING_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-exe
          path: target/i686-pc-windows-msvc/release/mcp-hangar.exe

      - name: Sign mcp-hangar.exe (SignPath Foundation)
        if: env.SIGNING_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: mcp-hangar
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned-exe.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: target/i686-pc-windows-msvc/release

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after install" }
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          & $iscc /DMyAppVersion=$ver installer\setup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Upload unsigned installer (for signing)
        id: unsigned-installer
        if: env.SIGNING_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: dist/MCP-Hangar-Setup-*-x86.exe

      - name: Sign installer (SignPath Foundation)
        if: env.SIGNING_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: mcp-hangar
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: dist

      - name: Package portable zip
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path target\i686-pc-windows-msvc\release\mcp-hangar.exe `
            -DestinationPath "dist\mcp-hangar-$ver-x86-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MCP-Hangar-Setup-*-x86.exe
            dist/mcp-hangar-*-x86-portable.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
